<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS125 — Python Knowledge Check</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  color: #1a1a1a;
  background: #f5f4f1;
  min-height: 100vh;
  padding: 1.5rem 1rem;
}

.sr-only {
  position: absolute; width: 1px; height: 1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
}

/* ── Layout ── */
.shell { max-width: 900px; margin: 0 auto; }

.header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px; margin-bottom: 0.75rem;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.title-text { font-size: 13px; color: #6b7280; }
.badge {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  background: #eee; border: 0.5px solid #ddd; color: #6b7280;
}
.stats { font-size: 12px; color: #6b7280; }

/* Progress bar */
.progress-wrap {
  height: 4px; background: #e0ddd6; border-radius: 2px; margin-bottom: 1.25rem;
}
.progress-fill {
  height: 100%; background: #0f6e56; border-radius: 2px;
  transition: width 0.4s ease; width: 0%;
}

/* Two panels */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: start;
}
@media (max-width: 599px) {
  .panels { grid-template-columns: 1fr; }
}

/* ── Problem panel ── */
.panel-problem {
  background: #fff;
  border: 0.5px solid #e0ddd6;
  border-radius: 12px;
  padding: 1.25rem;
}
.problem-meta {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 8px; margin-bottom: 0.875rem;
}
.meta-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge-mod {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  background: #e1f5ee; color: #085041; font-weight: 500;
}
.badge-topic {
  font-size: 11px; padding: 2px 8px; border-radius: 6px;
  background: #f0efea; color: #6b7280;
}
.question-counter { font-size: 12px; color: #9ca3af; white-space: nowrap; }

.scenario {
  font-size: 13px; color: #6b7280; font-style: italic;
  line-height: 1.5; margin-bottom: 0.875rem;
}
.ask {
  font-size: 14px; color: #1a1a1a; font-weight: 500;
  line-height: 1.65; margin-bottom: 1rem;
}

.hint-toggle {
  font-size: 12px; color: #6b7280; background: none; border: none;
  padding: 0; cursor: pointer; text-decoration: underline;
}
.hint-toggle:focus-visible { outline: 3px solid #185fa5; outline-offset: 2px; border-radius: 2px; }

.hint-text {
  font-size: 13px; color: #6b7280; line-height: 1.55;
  margin-top: 0.5rem; padding: 0.75rem;
  background: #f5f4f1; border-radius: 8px;
  display: none;
}
.hint-text.visible { display: block; }

/* ── Dot nav ── */
.dot-nav { margin-top: 1.5rem; }
.dot-nav-label {
  font-size: 11px; color: #6b7280; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 0.5rem; display: block;
}
.dots-row {
  display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 0.625rem;
  list-style: none;
}
.dot-btn {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid transparent;
  padding: 0; cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
  appearance: none; -webkit-appearance: none;
}
.dot-btn[aria-current="true"] { border-color: #888; }
.dot-btn:focus-visible { outline: 3px solid #185fa5; outline-offset: 3px; border-radius: 50%; }

.dot-legend { display: flex; flex-wrap: wrap; gap: 10px 14px; list-style: none; }
.legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: #6b7280;
}
.legend-swatch {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}

/* ── Editor panel ── */
.panel-editor {
  border-radius: 12px; overflow: hidden;
  border: 0.5px solid #e0ddd6;
}
.editor-titlebar {
  background: #2d2d2d; padding: 8px 12px;
  display: flex; align-items: center; gap: 6px;
}
.tb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tb-filename {
  font-size: 12px; color: #b0b0b0;
  margin-left: 8px; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}
.editor-body { background: #1e1e1e; padding: 0.875rem 1rem; }
.code-input {
  width: 100%; min-height: 160px;
  background: transparent; border: none; outline: none;
  color: #d4d4d4; caret-color: #d4d4d4;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 13px; line-height: 1.7;
  resize: vertical;
}
.code-input:focus { outline: 2px solid #5dcaa5; outline-offset: -2px; border-radius: 4px; }
.tab-hint { font-size: 11px; color: #8c8c8c; margin-top: 4px; font-family: monospace; }
.editor-toolbar {
  background: #252526; padding: 10px 12px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.btn-submit {
  background: #0f6e56; color: #fff;
  border: none; border-radius: 8px;
  padding: 7px 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.btn-submit:hover:not(:disabled) { background: #085041; }
.btn-submit:disabled { background: #3a3a3a; color: #777; cursor: default; }
.btn-submit:focus-visible { outline: 2px solid #5dcaa5; outline-offset: 2px; }

.spacer { flex: 1; }

.btn-nav {
  background: none; border: 0.5px solid #666; color: #bbb;
  border-radius: 8px; padding: 6px 13px; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.btn-nav:disabled { border-color: #444; color: #555; cursor: default; }
.btn-nav:hover:not(:disabled) { background: #383838; }
.btn-nav:focus-visible { outline: 2px solid #5dcaa5; outline-offset: 2px; }
.btn-nav.answered { background: #383838; border-color: #888; color: #eee; font-weight: 500; }

/* ── Feedback ── */
.feedback-region { outline: none; }
.feedback-card {
  margin-top: 12px; padding: 1rem 1.25rem;
  border-radius: 12px; border-width: 1px; border-style: solid;
  display: none;
}
.feedback-card.visible { display: block; }
.feedback-label { font-size: 13px; font-weight: 500; margin-bottom: 0.375rem; }
.feedback-text { font-size: 14px; color: #1a1a1a; line-height: 1.65; margin-bottom: 0.75rem; }
.feedback-retry { font-size: 12px; color: #6b7280; margin-top: 0.75rem; }
.example-block {
  background: #1e1e1e; border-radius: 8px;
  padding: 0.75rem 1rem;
}
.example-label { font-size: 11px; color: #8c8c8c; display: block; margin-bottom: 4px; font-family: monospace; }
.example-code { font-size: 13px; color: #d4d4d4; font-family: monospace; white-space: pre-wrap; word-break: break-all; }

/* Grade color themes */
.grade-pass  { background: #e1f5ee; border-color: #1d9e75; }
.grade-pass .feedback-label { color: #04342c; }

.grade-partial { background: #faeeda; border-color: #ba7517; }
.grade-partial .feedback-label { color: #412402; }

.grade-fail { background: #fcebeb; border-color: #e24b4a; }
.grade-fail .feedback-label { color: #501313; }

/* Next CTA */
.btn-next-cta {
  display: none; width: 100%; margin-top: 10px;
  padding: 14px 24px; background: #0f6e56; color: #fff;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: background 0.2s;
  align-items: center; justify-content: center; gap: 8px;
}
.btn-next-cta.visible { display: flex; }
.btn-next-cta:hover { background: #085041; }
.btn-next-cta:focus-visible { outline: 3px solid #04342c; outline-offset: 2px; }

/* Completion card */
.completion-card {
  display: none; margin-top: 10px; padding: 1.25rem;
  background: #e1f5ee; border: 1px solid #1d9e75;
  border-radius: 12px; text-align: center;
}
.completion-card.visible { display: block; }
.completion-title { font-size: 16px; font-weight: 500; color: #04342c; margin-bottom: 0.25rem; }
.completion-sub { font-size: 14px; color: #6b7280; }
</style>
</head>
<body>
<div class="shell">
  <h1 class="sr-only">CIS125 Python knowledge check — modules 1 and 2</h1>

  <div class="header">
    <div class="header-left">
      <span class="title-text">CIS125 — Knowledge Check</span>
      <span class="badge">Modules 1 &amp; 2</span>
    </div>
    <span class="stats" id="stats" aria-live="polite" aria-atomic="true">15 questions</span>
  </div>

  <div
    class="progress-wrap"
    role="progressbar"
    aria-valuemin="0" aria-valuemax="15" aria-valuenow="0"
    aria-label="0 of 15 questions passed"
    id="progress-bar-wrap"
  >
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="panels">

    <!-- ── Problem panel ── -->
    <div class="panel-problem">
      <div class="problem-meta">
        <div class="meta-badges">
          <span class="badge-mod" id="badge-mod">Module 1</span>
          <span class="badge-topic" id="badge-topic">Variables</span>
        </div>
        <span class="question-counter" id="counter" aria-label="Question 1 of 15">1 / 15</span>
      </div>

      <p class="scenario" id="scenario"></p>
      <p class="ask" id="ask"></p>

      <button
        class="hint-toggle"
        id="hint-btn"
        aria-expanded="false"
        aria-controls="hint-text"
      >show hint</button>
      <p class="hint-text" id="hint-text" role="note"></p>

      <!-- Dot nav -->
      <div class="dot-nav">
        <span class="dot-nav-label" id="dot-nav-label">Question progress</span>
        <ul
          class="dots-row"
          id="dots-row"
          role="group"
          aria-labelledby="dot-nav-label"
        ></ul>
        <ul class="dot-legend" aria-label="Dot color legend">
          <li class="legend-item"><span class="legend-swatch" style="background:#1d9e75" aria-hidden="true"></span>passed</li>
          <li class="legend-item"><span class="legend-swatch" style="background:#ef9f27" aria-hidden="true"></span>partial</li>
          <li class="legend-item"><span class="legend-swatch" style="background:#e24b4a" aria-hidden="true"></span>incorrect</li>
          <li class="legend-item"><span class="legend-swatch" style="background:#b4b2a9" aria-hidden="true"></span>unanswered</li>
        </ul>
      </div>
    </div>

    <!-- ── Editor panel ── -->
    <div class="panel-editor">
      <div class="editor-titlebar" aria-hidden="true">
        <div class="tb-dot" style="background:#ff5f57"></div>
        <div class="tb-dot" style="background:#ffbd2e"></div>
        <div class="tb-dot" style="background:#28c840"></div>
        <span class="tb-filename">solution.py</span>
      </div>

      <div class="editor-body">
        <label for="code-input" class="sr-only">
          Python code editor — Tab key inserts four spaces for indentation
        </label>
        <textarea
          id="code-input"
          class="code-input"
          placeholder="# type your Python here"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          aria-describedby="tab-hint"
        ></textarea>
        <p class="tab-hint" id="tab-hint">Tab = 4 spaces</p>
      </div>

      <div class="editor-toolbar">
        <button class="btn-submit" id="btn-submit" disabled aria-label="Submit code for grading">
          submit
        </button>
        <div class="spacer"></div>
        <button class="btn-nav" id="btn-prev" disabled aria-label="No previous question">
          ← prev
        </button>
        <button class="btn-nav" id="btn-next" disabled aria-label="Go to next question">
          next →
        </button>
      </div>
    </div>
  </div>

  <!-- ── Feedback region ── -->
  <div
    class="feedback-region"
    id="feedback-region"
    tabindex="-1"
    aria-live="polite"
    aria-atomic="true"
  >
    <div class="feedback-card" id="feedback-card">
      <p class="feedback-label" id="feedback-label"></p>
      <p class="feedback-text" id="feedback-text"></p>
      <div class="example-block" id="example-block">
        <span class="example-label">example</span>
        <code class="example-code" id="example-code"></code>
      </div>
      <p class="feedback-retry" id="feedback-retry"></p>
    </div>

    <button class="btn-next-cta" id="btn-next-cta" aria-label="Go to next question">
      Next question <span aria-hidden="true" style="font-size:18px;line-height:1">→</span>
    </button>

    <div class="completion-card" id="completion-card">
      <p class="completion-title" id="completion-title"></p>
      <p class="completion-sub" id="completion-sub"></p>
    </div>
  </div>
</div>

<script>
const PROBLEMS = [
  { id:1,  module:1, topic:"Variables",          scenario:"Steve's app tracks route lengths that players claim during a game.", ask:"Write one line of Python that assigns the integer 7 to a variable named route_length.", hint:"Variable assignment uses the = operator. No quotes — this is an integer, not a string." },
  { id:2,  module:1, topic:"Type Conversion",    scenario:"The app reads all user input as text. Steve needs the score as a number before doing math.", ask:"Write one line that converts the string '95' to an integer and stores it in a variable named score.", hint:"One of the type conversion functions from Module 1 does exactly this." },
  { id:3,  module:1, topic:"Modulo Operator",    scenario:"Steve wants to flag any route with an odd number of train cars for a special rule.", ask:"Write a Python expression (not a full statement) using the modulo operator that evaluates to 0 if trains is even.", hint:"Even numbers divided by 2 have no remainder. Modulo gives you the remainder." },
  { id:4,  module:1, topic:"Exponent Operator",  scenario:"A bonus scoring feature multiplies points by powers of 2.", ask:"Write one line that calculates 2 to the power of 8 and stores the result in a variable named result.", hint:"Python uses ** for exponentiation — not ^." },
  { id:5,  module:1, topic:"String Concatenation", scenario:"The route display needs a label that reads something like 'Route: Chicago'.", ask:"Write one line that combines the string 'Route: ' and the variable destination into one string, stored in label.", hint:"The + operator works on strings the same way it works on numbers — kind of." },
  { id:6,  module:1, topic:"len()",              scenario:"Steve wants to make sure player names don't exceed the display limit.", ask:"Write one line that gets the number of characters in game_name and stores it in name_length.", hint:"There's a built-in function that counts things." },
  { id:7,  module:1, topic:"round()",            scenario:"The app calculates win percentages that come out as long decimals.", ask:"Write one line that rounds win_rate to 2 decimal places and stores it in rounded_rate.", hint:"round() takes two arguments: the number to round, and how many decimal places to keep." },
  { id:8,  module:2, topic:"= vs ==",            scenario:"The route validator needs to check a specific route length without changing it.", ask:"Write a Python expression that checks whether route_length is equal to 4. Check — don't assign.", hint:"One operator assigns. The other one asks a question and returns True or False." },
  { id:9,  module:2, topic:"if Statement",       scenario:"Ticket to Ride routes are 1 to 6 segments long. Anything else is invalid.", ask:"Write a complete if statement that prints 'Valid route' if route_length is less than or equal to 6.", hint:"Don't forget the colon at the end of the if line. The print statement needs to be indented." },
  { id:10, module:2, topic:"if/else",            scenario:"The destination ticket checker needs to report two outcomes — ticket completed or not.", ask:"Write an if/else that prints 'Points earned' if ticket_complete is True, and 'Points deducted' otherwise.", hint:"Both branches need their own indented line. One condition covers both cases." },
  { id:11, module:2, topic:"Boolean and",        scenario:"Routes in Ticket to Ride are 1 to 6 segments. Both limits need to hold at once.", ask:"Write a Boolean expression using 'and' that is True only when route_length is greater than 0 AND less than or equal to 6.", hint:"Both conditions must be True for 'and' to return True. You need two comparison operators." },
  { id:12, module:2, topic:"Boolean not",        scenario:"Steve needs to catch players who haven't scored yet.", ask:"Write a Boolean expression using 'not' that is True when player_score is NOT equal to 0.", hint:"not flips the result of whatever Boolean expression follows it." },
  { id:13, module:2, topic:"String Comparison",  scenario:"Players type 'yes', 'Yes', 'YES' — all of these should count the same.", ask:"Write one line that converts ticket_answer to lowercase and stores it back in ticket_answer.", hint:"Strings have a method for this. Use dot notation." },
  { id:14, module:2, topic:"None",               scenario:"Steve's app checks whether a player has logged in before showing their stats.", ask:"Write a Boolean expression that is True when player_name has not been set — that is, when it equals None.", hint:"You can compare directly to None using ==. None is its own special value, not a string." },
  { id:15, module:2, topic:"elif",               scenario:"The route scorer handles six different point values, one per route length.", ask:"Write an elif clause that checks if route_length equals 3 and sets points equal to 4.", hint:"elif syntax mirrors if — colon at the end, indented body. It connects to an existing if block." }
];

const DOT_COLORS = {
  passed:    "#1d9e75",
  partial:   "#ef9f27",
  incorrect: "#e24b4a",
  current:   "#5f5e5a",
  unanswered:"#b4b2a9"
};

// ── State ──
let currentIdx = 0;
let results    = {};   // { problemId: 'pass'|'partial'|'fail' }
let loading    = false;
let showHint   = false;

// ── DOM refs ──
const $ = id => document.getElementById(id);
const codeInput    = $("code-input");
const btnSubmit    = $("btn-submit");
const btnPrev      = $("btn-prev");
const btnNext      = $("btn-next");
const btnNextCta   = $("btn-next-cta");
const feedbackCard = $("feedback-card");
const feedbackRegion = $("feedback-region");
const hintBtn      = $("hint-btn");
const hintText     = $("hint-text");

// ── Build dot nav ──
function buildDots() {
  const row = $("dots-row");
  row.innerHTML = "";
  PROBLEMS.forEach((p, i) => {
    const li  = document.createElement("li");
    const btn = document.createElement("button");
    btn.className   = "dot-btn";
    btn.dataset.idx = i;
    btn.addEventListener("click", () => navigateTo(i));
    btn.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); navigateTo(i); }
    });
    li.appendChild(btn);
    row.appendChild(li);
  });
}

function updateDots() {
  const btns = $("dots-row").querySelectorAll(".dot-btn");
  btns.forEach((btn, i) => {
    const p      = PROBLEMS[i];
    const grade  = results[p.id];
    const isCurr = i === currentIdx;
    const status = grade === "pass"    ? "passed"
                 : grade === "partial" ? "partial"
                 : grade === "fail"    ? "incorrect"
                 : isCurr             ? "current"
                 : "unanswered";
    btn.style.background  = DOT_COLORS[status];
    btn.style.borderColor = isCurr ? "#888" : "transparent";
    btn.setAttribute("aria-current", isCurr ? "true" : "false");
    const statusLabel = grade || (isCurr ? "current" : "unanswered");
    btn.setAttribute("aria-label", `Question ${i + 1}: ${p.topic} — ${statusLabel}`);
  });
}

// ── Render problem ──
function renderProblem() {
  const p = PROBLEMS[currentIdx];
  $("badge-mod").textContent   = `Module ${p.module}`;
  $("badge-topic").textContent = p.topic;
  $("counter").textContent     = `${currentIdx + 1} / ${PROBLEMS.length}`;
  $("counter").setAttribute("aria-label", `Question ${currentIdx + 1} of ${PROBLEMS.length}`);
  $("scenario").textContent    = p.scenario;
  $("ask").textContent         = p.ask;
  hintText.textContent         = p.hint;

  // Reset hint
  showHint = false;
  hintText.classList.remove("visible");
  hintBtn.setAttribute("aria-expanded", "false");
  hintBtn.textContent = "show hint";

  // Reset feedback
  feedbackCard.className  = "feedback-card";
  $("btn-next-cta").classList.remove("visible");
  $("completion-card").classList.remove("visible");

  // Reset code
  codeInput.value = "";
  updateSubmitBtn();
  updateNavBtns();
  updateDots();
  updateProgress();
}

// ── Progress bar & stats ──
function updateProgress() {
  const passCount    = Object.values(results).filter(g => g === "pass").length;
  const partialCount = Object.values(results).filter(g => g === "partial").length;
  const answeredCount = Object.keys(results).length;
  const pct = (passCount / PROBLEMS.length) * 100;

  $("progress-fill").style.width = pct + "%";
  const wrap = $("progress-bar-wrap");
  wrap.setAttribute("aria-valuenow", passCount);
  wrap.setAttribute("aria-label", `${passCount} of ${PROBLEMS.length} questions passed`);

  $("stats").textContent = answeredCount > 0
    ? `${passCount} of ${PROBLEMS.length} passed${partialCount > 0 ? ` · ${partialCount} partial` : ""}`
    : `${PROBLEMS.length} questions`;
}

// ── Submit button state ──
function updateSubmitBtn() {
  const empty = !codeInput.value.trim();
  btnSubmit.disabled = empty || loading;
  btnSubmit.setAttribute("aria-label", loading ? "Grading, please wait" : "Submit code for grading");
  btnSubmit.textContent = loading ? "grading…" : "submit";
}

// ── Nav buttons ──
function updateNavBtns(hasAnswer) {
  btnPrev.disabled = currentIdx === 0;
  btnPrev.setAttribute("aria-label", currentIdx === 0
    ? "No previous question"
    : `Go to previous question: question ${currentIdx}`);

  const isLast = currentIdx === PROBLEMS.length - 1;
  btnNext.disabled = isLast;
  btnNext.setAttribute("aria-label", isLast
    ? "This is the last question"
    : `${hasAnswer ? "Skip to" : "Go to"} next question: question ${currentIdx + 2}`);

  if (hasAnswer && !isLast) {
    btnNext.classList.add("answered");
    btnNext.textContent = "skip →";
  } else {
    btnNext.classList.remove("answered");
    btnNext.textContent = "next →";
  }
}

// ── Navigation ──
function navigateTo(idx) {
  currentIdx = idx;
  renderProblem();
  setTimeout(() => codeInput.focus(), 60);
}

// ── Hint toggle ──
hintBtn.addEventListener("click", () => {
  showHint = !showHint;
  hintText.classList.toggle("visible", showHint);
  hintBtn.setAttribute("aria-expanded", showHint ? "true" : "false");
  hintBtn.textContent = showHint ? "hide hint" : "show hint";
});

// ── Tab key in editor ──
codeInput.addEventListener("keydown", e => {
  if (e.key !== "Tab") return;
  e.preventDefault();
  const start = codeInput.selectionStart;
  const end   = codeInput.selectionEnd;
  const v     = codeInput.value;
  codeInput.value = v.substring(0, start) + "    " + v.substring(end);
  codeInput.selectionStart = codeInput.selectionEnd = start + 4;
});

codeInput.addEventListener("input", updateSubmitBtn);

// ── Prev / Next ──
btnPrev.addEventListener("click", () => {
  if (currentIdx > 0) navigateTo(currentIdx - 1);
});
btnNext.addEventListener("click", () => {
  if (currentIdx < PROBLEMS.length - 1) navigateTo(currentIdx + 1);
});
btnNextCta.addEventListener("click", () => {
  navigateTo(currentIdx + 1);
});

// ── Grade submission ──
btnSubmit.addEventListener("click", gradeCode);

async function gradeCode() {
  const code = codeInput.value.trim();
  if (!code || loading) return;
  loading = true;
  updateSubmitBtn();
  feedbackCard.className = "feedback-card";
  btnNextCta.classList.remove("visible");
  $("completion-card").classList.remove("visible");

  const problem = PROBLEMS[currentIdx];
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are grading a beginner Python student in CIS125, an intro programming course (Modules 1 and 2).

Problem prompt given to the student: "${problem.ask}"
Topic being tested: ${problem.topic}

Student's submitted code:
\`\`\`
${code}
\`\`\`

Evaluate and respond ONLY with valid JSON — no markdown, no preamble, no extra text:
{"grade": "pass", "feedback": "...", "example": "..."}

Grade options:
- "pass": correct or functionally equivalent — be generous; if it works and shows understanding, pass it
- "partial": right idea but syntax error, wrong required variable name, or minor omission
- "fail": wrong approach, wrong operator, or completely off-track

Rules for feedback: 1-2 sentences. Specific. Encouraging. Name exactly what's right or wrong.
Rules for example: always provide a clean correct example, even on a pass.
Do NOT penalize for variable name differences UNLESS the problem specifies the exact name.
Do NOT penalize for extra correct code.`
        }]
      })
    });

    const data  = await res.json();
    const text  = data.content.map(b => b.text || "").join("");
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    results[problem.id] = parsed.grade;
    showFeedback(parsed);
    updateDots();
    updateProgress();
    updateNavBtns(true);

    const isLast = currentIdx === PROBLEMS.length - 1;
    if (parsed.grade === "pass" && !isLast) {
      btnNextCta.classList.add("visible");
      setTimeout(() => btnNextCta.focus(), 120);
    } else if (parsed.grade === "pass" && isLast) {
      showCompletion();
      setTimeout(() => feedbackRegion.focus(), 120);
    } else {
      setTimeout(() => feedbackRegion.focus(), 120);
    }
  } catch {
    showFeedback({
      grade: "fail",
      feedback: "Grading failed — check your connection and try again.",
      example: ""
    });
    setTimeout(() => feedbackRegion.focus(), 120);
  }

  loading = false;
  updateSubmitBtn();
}

function showFeedback(parsed) {
  const icons = { pass: "✓", partial: "~", fail: "✗" };
  const labels = { pass: "Correct", partial: "Almost there", fail: "Not quite" };

  feedbackCard.className = `feedback-card grade-${parsed.grade} visible`;
  $("feedback-label").textContent = `${icons[parsed.grade]} ${labels[parsed.grade]}`;
  $("feedback-text").textContent  = parsed.feedback;

  const exBlock = $("example-block");
  if (parsed.example) {
    $("example-code").textContent = parsed.example;
    exBlock.style.display = "block";
  } else {
    exBlock.style.display = "none";
  }

  const retry = $("feedback-retry");
  if (parsed.grade !== "pass") {
    retry.textContent = "Revise your code above and submit again, or use the skip button to move on.";
    retry.style.display = "block";
  } else {
    retry.style.display = "none";
  }
}

function showCompletion() {
  const passCount    = Object.values(results).filter(g => g === "pass").length;
  const partialCount = Object.values(results).filter(g => g === "partial").length;
  $("completion-title").textContent = "All done.";
  $("completion-sub").textContent   =
    `${passCount} of ${PROBLEMS.length} questions passed` +
    (partialCount > 0 ? ` · ${partialCount} partial` : ` · no partials`);
  $("completion-card").classList.add("visible");
}

// ── Init ──
buildDots();
renderProblem();
</script>
</body>
</html>
