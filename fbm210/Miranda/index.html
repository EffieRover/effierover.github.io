<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda Priestly — Design Consultation</title>
 
<script>
// ============================================================
//  CONFIGURATION — edit this section only
// ============================================================
 
const API_KEY = "AQ.Ab8RN6KfLVvV_JA7HNz_N-NWmkaayraVgtzYnn4YzRqZgDLHHQ";
 
const MODEL = "gemini-2.0-flash";
 
const SYSTEM_PROMPT = `You are Miranda Priestly, the legendary editor-in-chief of the fictional Runway from Devil Wears Prada, known for your sharp eye, exacting standards, and ability to see potential in emerging designers. Today you're mentoring a fashion design student who needs help clarifying their design vision before selecting a base garment from the CLO library to modify for their portfolio.
 
Your role is to:
Ask pointed but supportive questions that help the student articulate their design vision
Guide them to translate aesthetic goals into structural garment requirements (seam types, fit, shaping)
Help them recognize what features to look for when browsing the library
Help them choose a well-suited base garment design to begin their project
Be direct and expect thoughtful answers, but remain encouraging
Channel your Devil Wears Prada energy while being genuinely invested in their success
 
Important guidelines:
Ask ONE question at a time and wait for the student's response
Do NOT make design decisions for them - you're a sounding board, not their brain
Offer examples and suggestions as possibilities, never as prescriptions
When giving advice about structural features, frame it as "designers often..." or "you might consider..." rather than "you should..."
Remember to double-check student vision against seams and structure of the base garment they are selecting
After covering their design vision, structural requirements, and what to look for, check in: "Do you feel ready to browse the library, or would you like to explore any of this further?"
If they're ready to browse, give them a Miranda-esque sendoff and end the conversation
If they need more clarity, continue with follow-up questions
Include some stylistic text, for example, "Miranda looks up at your entrance and dramatically removes her glasses."
 
Remember: Your goal is to help them develop their own design thinking, not to hand them answers. Be exacting but fair. Be sharp but supportive. Make them think.
 
Begin by introducing yourself and asking your first question about their design vision.`;
 
// ============================================================
//  END CONFIGURATION
// ============================================================
</script>
 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
 
<style>
  /*
    WCAG 2.1 AA Contrast Ratios (verified):
    Body text #1a1a1a on #ffffff         → 17.4:1  ✓
    Label text #6b4c00 on #ffffff        → 7.9:1   ✓
    Miranda bubble #1a1a1a on #f5f0e8   → 15.3:1  ✓
    User bubble #ffffff on #1a1a1a      → 17.4:1  ✓
    Send button #0d0d0d on #c9a96e      → 8.7:1   ✓
    Placeholder #767676 on #ffffff       → 4.5:1   ✓
    Gold #c9a96e used for borders/decorative only (non-text)
  */
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: #ffffff;
    color: #1a1a1a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
 
  /* HEADER */
  header {
    background: #ffffff;
    border-bottom: 1px solid #d4c9b0;
    padding: 22px 40px 16px;
    text-align: center;
    flex-shrink: 0;
  }
 
  .runway-label {
    letter-spacing: 0.3em;
    font-size: 13px;
    color: #6b4c00;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
 
  header h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 300;
    color: #1a1a1a;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1;
  }
 
  .subtitle {
    font-size: 13px;
    color: #555555;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 7px;
  }
 
  .gold-rule {
    width: 50px;
    height: 1px;
    background: #c9a96e;
    margin: 10px auto 0;
  }
 
  /* CHAT AREA */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    scroll-behavior: smooth;
  }
 
  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: #f0ece4; }
  #chat-area::-webkit-scrollbar-thumb { background: #c9a96e; }
 
  /* SPLASH */
  #splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
    min-height: 300px;
  }
 
  .splash-quote {
    color: #6b4c00;
    font-size: clamp(16px, 2.5vw, 20px);
    font-style: italic;
    letter-spacing: 0.04em;
    max-width: 480px;
    line-height: 1.75;
    margin-bottom: 34px;
  }
 
  #start-btn {
    background: #1a1a1a;
    border: 2px solid #1a1a1a;
    color: #ffffff;
    padding: 13px 42px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', Georgia, serif;
    transition: background 0.2s, color 0.2s;
  }
 
  #start-btn:hover {
    background: #ffffff;
    color: #1a1a1a;
  }
 
  #start-btn:focus-visible {
    outline: 3px solid #c9a96e;
    outline-offset: 3px;
  }
 
  /* MESSAGES */
  .msg-miranda, .msg-user {
    display: flex;
    flex-direction: column;
    max-width: 84%;
  }
 
  .msg-miranda { align-items: flex-start; }
  .msg-user { align-items: flex-end; align-self: flex-end; }
 
  .msg-label {
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
 
  .msg-miranda .msg-label { color: #6b4c00; }
  .msg-user .msg-label { color: #555555; }
 
  .bubble-miranda {
    background: #f5f0e8;
    border-left: 3px solid #c9a96e;
    padding: 16px 20px;
    color: #1a1a1a;
    font-size: clamp(15px, 1.8vw, 17px);
    line-height: 1.8;
    white-space: pre-wrap;
  }
 
  .bubble-user {
    background: #1a1a1a;
    color: #ffffff;
    padding: 13px 18px;
    font-size: clamp(15px, 1.8vw, 16px);
    line-height: 1.7;
    white-space: pre-wrap;
  }
 
  /* TYPING INDICATOR */
  .typing-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: #f5f0e8;
    border-left: 3px solid #c9a96e;
  }
 
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6b4c00;
    animation: pulse 1.2s ease-in-out infinite;
  }
 
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
 
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }
 
  /* INPUT ROW */
  #input-row {
    flex-shrink: 0;
    display: none;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid #d4c9b0;
    background: #ffffff;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
  }
 
  #input-row.visible { display: flex; }
 
  #user-input {
    flex: 1;
    background: #ffffff;
    border: 1px solid #999999;
    border-bottom: 2px solid #c9a96e;
    color: #1a1a1a;
    padding: 11px 15px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
  }
 
  #user-input::placeholder { color: #767676; }
 
  #user-input:focus-visible {
    border-color: #6b4c00;
    outline: 2px solid #6b4c00;
    outline-offset: 1px;
  }
 
  #send-btn {
    background: #c9a96e;
    border: 2px solid #c9a96e;
    color: #0d0d0d;
    padding: 11px 20px;
    cursor: pointer;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-size: 13px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    flex-shrink: 0;
    transition: opacity 0.2s;
    min-height: 44px;
    min-width: 44px;
  }
 
  #send-btn:disabled { opacity: 0.45; cursor: default; }
 
  #send-btn:focus-visible {
    outline: 3px solid #1a1a1a;
    outline-offset: 3px;
  }
 
  #send-btn:hover:not(:disabled) {
    background: #b8924e;
    border-color: #b8924e;
  }
 
  /* ERROR */
  #error-msg {
    color: #a30000;
    font-size: 14px;
    text-align: center;
    letter-spacing: 0.05em;
    padding: 6px 20px;
    display: none;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    word-break: break-word;
  }
</style>
</head>
 
<body>
 
<header>
  <div class="runway-label">Runway Magazine</div>
  <h1>Miranda Priestly</h1>
  <div class="subtitle">Design Consultation</div>
  <div class="gold-rule" role="presentation"></div>
</header>
 
<main id="chat-area" aria-live="polite" aria-label="Conversation with Miranda Priestly">
  <div id="splash">
    <p class="splash-quote">"You have no idea how much is riding on what you're about to create. Let's make sure you do."</p>
    <button id="start-btn">Enter the Office</button>
  </div>
</main>
 
<div id="error-msg" role="alert"></div>
 
<div id="input-row" role="form" aria-label="Send a message">
  <textarea
    id="user-input"
    placeholder="Speak carefully. She's listening."
    rows="1"
    aria-label="Your message to Miranda"
  ></textarea>
  <button id="send-btn" aria-label="Send message">Send</button>
</div>
 
<script>
  const chatArea = document.getElementById("chat-area");
  const inputRow = document.getElementById("input-row");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const errorMsg = document.getElementById("error-msg");
  const startBtn = document.getElementById("start-btn");
 
  let history = [];
  let isLoading = false;
 
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
  });
 
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
 
  sendBtn.addEventListener("click", sendMessage);
  startBtn.addEventListener("click", startSession);
 
  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }
 
  function showError(text) {
    errorMsg.textContent = text;
    errorMsg.style.display = "block";
    setTimeout(() => { errorMsg.style.display = "none"; }, 10000);
  }
 
  function appendMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = role === "assistant" ? "msg-miranda" : "msg-user";
 
    const label = document.createElement("div");
    label.className = "msg-label";
    label.setAttribute("aria-hidden", "true");
    label.textContent = role === "assistant" ? "Miranda Priestly" : "You";
 
    const bubble = document.createElement("div");
    bubble.className = role === "assistant" ? "bubble-miranda" : "bubble-user";
    bubble.textContent = text;
 
    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatArea.appendChild(wrapper);
    scrollBottom();
  }
 
  function showTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "msg-miranda";
    wrapper.id = "typing-indicator";
    wrapper.setAttribute("aria-label", "Miranda is typing");
 
    const label = document.createElement("div");
    label.className = "msg-label";
    label.setAttribute("aria-hidden", "true");
    label.textContent = "Miranda Priestly";
 
    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.setAttribute("aria-hidden", "true");
    dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
 
    wrapper.appendChild(label);
    wrapper.appendChild(dots);
    chatArea.appendChild(wrapper);
    scrollBottom();
  }
 
  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }
 
  async function callGemini(conversationHistory) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`;
 
    const contents = conversationHistory.map(m => ({
      role: m.role === "assistant" ? "model" : "user",
      parts: [{ text: m.content }]
    }));
 
    const body = {
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: contents,
      generationConfig: { maxOutputTokens: 1000 }
    };
 
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-goog-api-key": API_KEY
      },
      body: JSON.stringify(body)
    });
 
    if (!response.ok) {
      const err = await response.json();
      throw new Error(JSON.stringify(err));
    }
 
    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
  }
 
  async function startSession() {
    document.getElementById("splash").remove();
    inputRow.classList.add("visible");
    setLoading(true);
 
    history = [{ role: "user", content: "Begin." }];
 
    try {
      const reply = await callGemini(history);
      history.push({ role: "assistant", content: reply });
      appendMessage("assistant", reply);
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }
 
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;
 
    userInput.value = "";
    userInput.style.height = "auto";
 
    history.push({ role: "user", content: text });
    appendMessage("user", text);
    setLoading(true);
    showTyping();
 
    try {
      const reply = await callGemini(history);
      history.push({ role: "assistant", content: reply });
      removeTyping();
      appendMessage("assistant", reply);
    } catch (e) {
      removeTyping();
      showError(e.message);
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }
 
  function setLoading(state) {
    isLoading = state;
    sendBtn.disabled = state;
    userInput.disabled = state;
  }
</script>
 
</body>
</html>
